{{if not .}}
<p class="text-muted">No attributes defined for this category.</p>
{{else}}
<div class="form-grid-2">
    {{range .}}
    <div class="form-group">
        <label class="form-label">
            {{.Attr.DisplayName}}
            {{if .Attr.Unit}}<span class="form-label-hint">({{deref .Attr.Unit}})</span>{{end}}
            {{if .Attr.IsRequired}}<span class="form-required">*</span>{{end}}
        </label>
        {{if eq .Attr.DataType "numeric"}}
        <input type="text" inputmode="decimal" name="attr_{{.Attr.ID}}"
               placeholder="e.g. 4.7k, 100n, 1M"
               {{if .Attr.IsRequired}}required{{end}}
               class="input">
        {{else if eq .Attr.DataType "text"}}
        <input type="text" name="attr_{{.Attr.ID}}"
               {{if .Attr.IsRequired}}required{{end}}
               class="input">
        {{else if eq .Attr.DataType "enum"}}
        <select name="attr_{{.Attr.ID}}" {{if .Attr.IsRequired}}required{{end}}
                data-combobox data-allow-create="true"
                data-create-url="/api/enums/{{deref .Attr.EnumGroupID}}/values/quick-create"
                data-placeholder="Search or create value..."
                class="input">
            <option value="">— select —</option>
            {{range .EnumValues}}
            <option value="{{.ID}}">{{.DisplayName}}</option>
            {{end}}
        </select>
        {{else if eq .Attr.DataType "boolean"}}
        <div style="padding-top:0.25rem">
            <label class="check-label">
                <input type="checkbox" name="attr_{{.Attr.ID}}" value="on" class="checkbox">
                <span>Yes</span>
            </label>
        </div>
        {{end}}
    </div>
    {{end}}
</div>
{{end}}
