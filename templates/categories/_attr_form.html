<tr>
    <td>
        <input type="text" name="name" required placeholder="resistance"
               class="input input-sm">
    </td>
    <td>
        <input type="text" name="display_name" required placeholder="Resistance"
               class="input input-sm">
    </td>
    <td>
        <select name="data_type" required onchange="var es = this.closest('tr').querySelector('.enum-select'); if(es) es.style.display = this.value === 'enum' ? '' : 'none'"
                class="input input-sm">
            <option value="numeric">numeric</option>
            <option value="text">text</option>
            <option value="enum">enum</option>
            <option value="boolean">boolean</option>
        </select>
    </td>
    <td>
        <input type="text" name="unit" placeholder="e.g. V, Ω"
               class="input input-sm">
    </td>
    <td>
        <select name="enum_group_id" class="enum-select input input-sm"
                data-combobox data-allow-create="true"
                data-create-url="/api/enums/quick-create"
                data-placeholder="Search or create group...">
            <option value="">(select group)</option>
            {{range .EnumGroups}}
            <option value="{{.ID}}">{{.Name}}</option>
            {{end}}
        </select>
    </td>
    <td>
        <input type="checkbox" name="is_required" class="checkbox">
    </td>
    <td>
        <input type="number" name="sort_order" value="0"
               class="input input-sm" style="width:4rem">
    </td>
    <td class="td-right">
        <button type="button"
                hx-post="/admin/categories/{{.CategoryID}}/attributes"
                hx-target="closest tr"
                hx-swap="outerHTML"
                hx-include="closest tr"
                class="link text-green font-medium">Save</button>
    </td>
</tr>
