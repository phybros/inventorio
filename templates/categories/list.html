{{define "content"}}
<div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Categories</h1>
    <a href="#new-category-form" onclick="document.getElementById('new-category-form').classList.toggle('hidden')"
       class="rounded-md bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-700">
        New Category
    </a>
</div>

<!-- Inline create form -->
<form id="new-category-form" action="/admin/categories" method="POST"
      class="hidden mb-6 bg-white dark:bg-gray-800 p-4 rounded-lg border border-gray-200 dark:border-gray-700">
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-4">
        <div>
            <label for="name" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Name</label>
            <input type="text" name="name" id="name" required
                   class="block w-full rounded-md border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white shadow-sm focus:border-blue-500 focus:ring-blue-500 text-sm px-3 py-2 border">
        </div>
        <div>
            <label for="parent_id" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Parent Category</label>
            <select name="parent_id" id="parent_id"
                    class="block w-full rounded-md border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white shadow-sm focus:border-blue-500 focus:ring-blue-500 text-sm px-3 py-2 border">
                <option value="">(none — top-level)</option>
                {{range .}}
                    {{if not .ParentID}}
                    <option value="{{.ID}}">{{.Name}}</option>
                    {{end}}
                {{end}}
            </select>
        </div>
        <div>
            <label for="description" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Description</label>
            <input type="text" name="description" id="description"
                   class="block w-full rounded-md border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white shadow-sm focus:border-blue-500 focus:ring-blue-500 text-sm px-3 py-2 border">
        </div>
    </div>
    <button type="submit" class="rounded-md bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-700">
        Create Category
    </button>
</form>

<div class="bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700 overflow-hidden">
    <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-700">
        <thead class="bg-gray-50 dark:bg-gray-800/50">
            <tr>
                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Name</th>
                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Parent</th>
                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Attributes</th>
                <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Actions</th>
            </tr>
        </thead>
        <tbody class="divide-y divide-gray-200 dark:divide-gray-700">
            {{range .}}
            <tr id="cat-{{.ID}}" class="hover:bg-gray-50 dark:hover:bg-gray-700/50">
                <td class="px-4 py-3 text-sm">
                    {{if .ParentID}}
                    <span class="text-gray-400 mr-1">└</span>
                    {{end}}
                    <span class="{{if not .ParentID}}font-medium{{end}} text-gray-900 dark:text-gray-100">{{.Name}}</span>
                </td>
                <td class="px-4 py-3 text-sm text-gray-500 dark:text-gray-400">{{if .ParentName}}{{deref .ParentName}}{{else}}—{{end}}</td>
                <td class="px-4 py-3 text-sm text-gray-500 dark:text-gray-400">{{.AttrCount}}</td>
                <td class="px-4 py-3 text-sm text-right space-x-3">
                    <a href="/admin/categories/{{.ID}}/edit" class="text-blue-600 hover:text-blue-800 dark:text-blue-400 dark:hover:text-blue-300">Edit</a>
                    <button hx-delete="/admin/categories/{{.ID}}" hx-target="#cat-{{.ID}}" hx-swap="outerHTML"
                            hx-confirm="Delete '{{.Name}}'?"
                            class="text-red-600 hover:text-red-800 dark:text-red-400 dark:hover:text-red-300">Delete</button>
                </td>
            </tr>
            {{end}}
        </tbody>
    </table>
</div>
{{end}}
