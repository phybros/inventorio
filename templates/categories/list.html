{{define "content"}}
<div class="page-header">
    <h1 class="page-title">Categories</h1>
    <a href="#new-category-form" onclick="document.getElementById('new-category-form').classList.toggle('hidden')"
       class="btn btn-primary">
        New Category
    </a>
</div>

<form id="new-category-form" action="/admin/categories" method="POST"
      class="hidden card card-body mb-6">
    <div class="form-grid-3 mb-4">
        <div class="form-group">
            <label for="name" class="form-label">Name</label>
            <input type="text" name="name" id="name" required class="input">
        </div>
        <div class="form-group">
            <label for="parent_id" class="form-label">Parent Category</label>
            <select name="parent_id" id="parent_id"
                    data-combobox data-allow-create="true"
                    data-create-url="/api/categories/quick-create"
                    data-placeholder="Search or create parent..."
                    class="input">
                <option value="">(none — top-level)</option>
                {{range .}}
                    {{if not .ParentID}}
                    <option value="{{.ID}}">{{.Name}}</option>
                    {{end}}
                {{end}}
            </select>
        </div>
        <div class="form-group">
            <label for="description" class="form-label">Description</label>
            <input type="text" name="description" id="description" class="input">
        </div>
    </div>
    <button type="submit" class="btn btn-primary">Create Category</button>
</form>

<div class="table-wrap">
    <table class="table">
        <thead>
            <tr>
                <th>Name</th>
                <th>Parent</th>
                <th>Attributes</th>
                <th class="th-right">Actions</th>
            </tr>
        </thead>
        <tbody>
            {{range .}}
            <tr id="cat-{{.ID}}" class="table-row-hover">
                <td>
                    {{if .ParentID}}<span class="text-subtle" style="margin-right:0.25rem">└</span>{{end}}
                    <span {{if not .ParentID}}class="font-medium"{{end}}>{{.Name}}</span>
                </td>
                <td class="td-muted">{{if .ParentName}}{{deref .ParentName}}{{else}}—{{end}}</td>
                <td class="td-muted">{{.AttrCount}}</td>
                <td class="td-right">
                    <span class="row-actions">
                        <a href="/admin/categories/{{.ID}}/edit" class="link">Edit</a>
                        <button hx-delete="/admin/categories/{{.ID}}" hx-target="#cat-{{.ID}}" hx-swap="outerHTML"
                                hx-confirm="Delete '{{.Name}}'?"
                                class="link-danger">Delete</button>
                    </span>
                </td>
            </tr>
            {{end}}
        </tbody>
    </table>
</div>
{{end}}
