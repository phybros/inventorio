{{define "content"}}
<div class="mb-6">
    <a href="/projects" class="link">&larr; Back to Projects</a>
</div>

<h1 class="page-title mb-6">
    {{if .IsNew}}New Project{{else}}Edit: {{.Project.Name}}{{end}}
</h1>

<form {{if .IsNew}}action="/projects" method="POST"{{else}}action="/projects/{{.Project.ID}}" method="POST"{{end}}
      class="space-y-6" style="max-width:48rem">
    {{if not .IsNew}}
    <input type="hidden" name="_method" value="PUT">
    {{end}}

    {{if .Errors}}
    <div class="alert alert-red">
        <ul>
        {{range .Errors}}<li>{{.}}</li>{{end}}
        </ul>
    </div>
    {{end}}

    <div class="form-section">
        <div class="form-grid-2">
            <div class="form-group col-span-2">
                <label class="form-label">Name <span class="form-required">*</span></label>
                <input type="text" name="name" required
                       value="{{if .Project}}{{.Project.Name}}{{end}}"
                       class="input" placeholder="e.g. LED Matrix Driver v2">
            </div>
            <div class="form-group col-span-2">
                <label class="form-label">Description</label>
                <textarea name="description" rows="3" class="input"
                          placeholder="What is this project?">{{if .Project}}{{deref .Project.Description}}{{end}}</textarea>
            </div>
            <div class="form-group">
                <label class="form-label">Status</label>
                <select name="status" class="input">
                    {{$status := "active"}}
                    {{if .Project}}{{$status = .Project.Status}}{{end}}
                    <option value="active"   {{if eq $status "active"}}selected{{end}}>Active</option>
                    <option value="draft"    {{if eq $status "draft"}}selected{{end}}>Draft</option>
                    <option value="archived" {{if eq $status "archived"}}selected{{end}}>Archived</option>
                </select>
            </div>
        </div>
    </div>

    <div class="form-actions">
        <button type="submit" class="btn btn-primary">
            {{if .IsNew}}Create Project{{else}}Save Changes{{end}}
        </button>
        {{if .IsNew}}
        <a href="/projects" class="link-muted">Cancel</a>
        {{else}}
        <a href="/projects/{{.Project.ID}}" class="link-muted">Cancel</a>
        {{end}}
    </div>
</form>
{{end}}
