<div id="group-{{.ID}}" class="card card-body">
    <div class="flex-row-between mb-3">
        <h2 class="section-title" style="margin:0">{{.Name}}</h2>
        <button hx-delete="/admin/enums/{{.ID}}" hx-target="#group-{{.ID}}" hx-swap="outerHTML"
                hx-confirm="Delete group '{{.Name}}'? This cannot be undone."
                class="link-danger btn-sm">Delete Group</button>
    </div>

    <ul id="values-{{.ID}}" class="space-y-1 mb-3">
        {{range .Values}}
        <li id="val-{{.ID}}" class="enum-value-row row-group">
            <span>
                <code class="code-tag">{{.Value}}</code>
                <span class="text-muted" style="margin-left:0.5rem">{{.DisplayName}}</span>
            </span>
            <button hx-delete="/admin/enums/values/{{.ID}}" hx-target="#val-{{.ID}}" hx-swap="outerHTML"
                    class="link-danger btn-xs row-group-action">remove</button>
        </li>
        {{end}}
    </ul>

    <form hx-post="/admin/enums/{{.ID}}/values" hx-target="#values-{{.ID}}" hx-swap="beforeend"
          hx-on::after-request="if(event.detail.successful) this.reset()"
          class="flex-row gap-2" style="padding-top:0.75rem;border-top:1px solid var(--border-subtle)">
        <input type="text" name="value" required placeholder="value"
               class="input input-sm" style="width:10rem">
        <input type="text" name="display_name" required placeholder="Display Name"
               class="input input-sm" style="width:12rem">
        <button type="submit" class="btn btn-secondary btn-sm">Add Value</button>
    </form>
</div>
