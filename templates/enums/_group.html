<div id="group-{{.ID}}" class="bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700 p-5">
    <div class="flex items-center justify-between mb-3">
        <h2 class="text-lg font-semibold text-gray-800 dark:text-gray-200">{{.Name}}</h2>
        <button hx-delete="/admin/enums/{{.ID}}" hx-target="#group-{{.ID}}" hx-swap="outerHTML"
                hx-confirm="Delete group '{{.Name}}'? This cannot be undone."
                class="text-sm text-red-600 hover:text-red-800 dark:text-red-400 dark:hover:text-red-300">Delete Group</button>
    </div>

    <ul id="values-{{.ID}}" class="mb-3 space-y-1">
        {{range .Values}}
        <li id="val-{{.ID}}" class="flex items-center justify-between py-1 px-2 rounded hover:bg-gray-50 dark:hover:bg-gray-700/50 group">
            <span>
                <code class="text-sm text-gray-600 dark:text-gray-300 bg-gray-100 dark:bg-gray-700 px-1.5 py-0.5 rounded">{{.Value}}</code>
                <span class="text-sm text-gray-500 dark:text-gray-400 ml-2">{{.DisplayName}}</span>
            </span>
            <button hx-delete="/admin/enums/values/{{.ID}}" hx-target="#val-{{.ID}}" hx-swap="outerHTML"
                    class="text-xs text-red-500 hover:text-red-700 dark:text-red-400 dark:hover:text-red-300 opacity-0 group-hover:opacity-100 transition-opacity">remove</button>
        </li>
        {{end}}
    </ul>

    <form hx-post="/admin/enums/{{.ID}}/values" hx-target="#values-{{.ID}}" hx-swap="beforeend"
          hx-on::after-request="if(event.detail.successful) this.reset()"
          class="flex items-end gap-2 pt-3 border-t border-gray-100 dark:border-gray-700">
        <input type="text" name="value" required placeholder="value"
               class="block w-40 rounded-md border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white shadow-sm text-sm px-2 py-1.5 border">
        <input type="text" name="display_name" required placeholder="Display Name"
               class="block w-48 rounded-md border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white shadow-sm text-sm px-2 py-1.5 border">
        <button type="submit" class="rounded-md bg-gray-100 dark:bg-gray-700 px-3 py-1.5 text-sm font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-600 border border-gray-300 dark:border-gray-600">
            Add Value
        </button>
    </form>
</div>
