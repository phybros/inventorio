<li id="val-{{.ID}}" class="enum-value-row row-group">
    <span>
        <code class="code-tag">{{.Value}}</code>
        <span class="text-muted" style="margin-left:0.5rem">{{.DisplayName}}</span>
    </span>
    <button hx-delete="/admin/enums/values/{{.ID}}" hx-target="#val-{{.ID}}" hx-swap="outerHTML"
            class="link-danger btn-xs row-group-action">remove</button>
</li>
