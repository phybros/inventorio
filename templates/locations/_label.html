<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Label: {{.Name}}</title>
    <link rel="stylesheet" href="/static/app.css">
    <script src="/static/js/qrcodejs-1.0.0.min.js"></script>
</head>
<body class="label-page">

    <div class="label-actions no-print">
        <button onclick="window.print()" class="btn btn-primary">Print Label</button>
        <a href="/admin/locations" class="btn btn-secondary">Back</a>
    </div>

    <!-- Label card — sized for a standard address label (~3.5" × 1.5") -->
    <div class="label-card">
        <div id="qrcode" style="flex-shrink:0"></div>
        <div style="flex:1;min-width:0">
            {{if .ParentName}}
            <p class="label-parent">{{deref .ParentName}}</p>
            {{end}}
            <p class="label-name">{{.Name}}</p>
            {{if .Description}}
            <p class="label-desc">{{deref .Description}}</p>
            {{end}}
            <p class="label-barcode">{{.Barcode}}</p>
        </div>
    </div>

    <script>
        new QRCode(document.getElementById("qrcode"), {
            text: "{{.Barcode}}",
            width: 88,
            height: 88,
            colorDark: "#000000",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.M
        });
    </script>
</body>
</html>
